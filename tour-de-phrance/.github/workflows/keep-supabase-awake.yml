name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 8 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sS "${{ secrets.TOUR_DE_PHRANCE_SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.TOUR_DE_PHRANCE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.TOUR_DE_PHRANCE_SUPABASE_ANON_KEY }}" \
            || true
