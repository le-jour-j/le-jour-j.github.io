];

// Mutations sont les nœuds 09+
const isMutation = n => parseInt(n.id) >= 9;

const EDGES = [
  // corpus interne
  ["01","03"],["01","04"],["01","05"],
  ["03","06"],["03","07"],
  ["04","05"],["04","08"],
  ["05","06"],["06","07"],
  ["07","08"],["08","03"],
  ["01","07"],["04","06"],
  // mutations connectées au corpus
  ["07","09"],["08","09"],["04","09"],
  ["07","10"],["09","10"],
  ["10","11"],["09","11"],["08","11"],
  ["12","01"],["12","04"],["12","09"],["12","11"],
  // cross-mutations
  ["10","12"],["11","12"],
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale;
let hoveredNode = null;
let t = 0;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  scale = Math.min(W, H) / 100;
}
resize();
window.addEventListener('resize', resize);

function nodePos(n){
  return { x: n.px/100*W, y: n.py/100*H };
}

NODES.forEach((n,i)=>{ n._phase = i * 0.62; n._hover = 0; });

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function draw(){
  t += 0.010;
  ctx.clearRect(0,0,W,H);

  // subtle bg pulse
  const pulse = Math.sin(t*0.25)*0.5+0.5;
  const grad = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.65);
  grad.addColorStop(0,`rgba(28,12,55,${0.05+pulse*0.02})`);
  grad.addColorStop(1,'rgba(5,4,12,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // edges
  EDGES.forEach(([a,b])=>{
    const na=NODES.find(n=>n.id===a), nb=NODES.find(n=>n.id===b);
    if(!na||!nb) return;
    const pa=nodePos(na), pb=nodePos(nb);
    const isMut = isMutation(na)||isMutation(nb);
    const isHover = hoveredNode&&(hoveredNode.id===a||hoveredNode.id===b);
    
    // particle
    const ph = ((t * 0.35 + na._phase*0.5) % 1);
    const ppx = pa.x+(pb.x-pa.x)*ph;
    const ppy = pa.y+(pb.y-pa.y)*ph;

    ctx.beginPath();
    ctx.moveTo(pa.x,pa.y);
    ctx.lineTo(pb.x,pb.y);
    if(isMut){
      ctx.setLineDash([3,6]);
    } else {
      ctx.setLineDash([]);
    }
    ctx.strokeStyle = isHover
      ? `rgba(200,165,255,0.28)`
      : (isMut ? `rgba(120,80,180,0.1)` : `rgba(70,55,130,0.11)`);
    ctx.lineWidth = isHover ? 0.9 : 0.45;
    ctx.stroke();
    ctx.setLineDash([]);

    // particle dot
    ctx.beginPath();
    ctx.arc(ppx,ppy,isHover?2:1.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(190,155,255,${isHover?0.5:0.12})`;
    ctx.fill();
  });

  // nodes
  NODES.forEach(n=>{
    const p = nodePos(n);
    const isHover = hoveredNode&&hoveredNode.id===n.id;
    const mut = isMutation(n);

    if(isHover) n._hover=Math.min(n._hover+0.1,1);
    else n._hover=Math.max(n._hover-0.07,0);

    const pulse=Math.sin(t+n._phase)*0.5+0.5;
    const r = (scale*(mut?0.6:0.75)) + n._hover*scale*0.55 + pulse*scale*(mut?0.12:0.15);
    const rgb=hexToRgb(n.color);

    // outer glow
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*4.5);
    g.addColorStop(0,`rgba(${rgb.r},${rgb.g},${rgb.b},${0.05+n._hover*0.14+pulse*0.02})`);
    g.addColorStop(1,`rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
    ctx.beginPath();ctx.arc(p.x,p.y,r*4.5,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();

    // ring (dashed for mutations)
    ctx.beginPath();ctx.arc(p.x,p.y,r*2.2,0,Math.PI*2);
    if(mut) ctx.setLineDash([2,5]);
    ctx.strokeStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${isHover?0.5:0.18})`;
    ctx.lineWidth=0.5;ctx.stroke();
    ctx.setLineDash([]);

    // core
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rgb.r},${rgb.g},${rgb.b},${isHover?0.85:0.6})`;
    ctx.fill();

    // center
    ctx.beginPath();ctx.arc(p.x,p.y,r*0.28,0,Math.PI*2);
    ctx.fillStyle='rgba(255,245,255,0.92)';ctx.fill();

    // num label
    const sz=scale*(mut?0.48:0.52);
    ctx.font=`${sz}px Inconsolata`;
    ctx.fillStyle=`rgba(210,190,255,${0.28+n._hover*0.45})`;
    ctx.textAlign='center';
    ctx.fillText(n.id, p.x, p.y+r*2+scale*0.55);
  });

  requestAnimationFrame(draw);
}
draw();

// mouse
canvas.addEventListener('mousemove', e=>{
  const mx=e.clientX, my=e.clientY;
  let found=null;
  NODES.forEach(n=>{
    const p=nodePos(n);
    const d=Math.hypot(mx-p.x,my-p.y);
    if(d<scale*2) found=n;
  });
  hoveredNode=found;
  canvas.style.cursor=found?'pointer':'default';

  const tip=document.getElementById('tooltip');
  if(found){
    document.getElementById('tt-title').textContent=found.title;
    document.getElementById('tt-role').textContent=found.role;
    tip.style.opacity='1';
    // position — avoid edges
    let tx=mx+20, ty=my-12;
    if(tx+160>W) tx=mx-170;
    if(ty+60>H)  ty=my-60;
    tip.style.left=tx+'px';
    tip.style.top=ty+'px';
    document.getElementById('hud-r').textContent='pièce '+found.id+' · '+found.role;
  } else {
    tip.style.opacity='0';
    document.getElementById('hud-r').textContent='12 nœuds · ∿';
  }
});

canvas.addEventListener('click', e=>{
  if(hoveredNode) openNode(hoveredNode);
});

canvas.addEventListener('mouseleave',()=>{
  hoveredNode=null;
  document.getElementById('tooltip').style.opacity='0';
});

// touch
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  const t2=e.changedTouches[0];
  const mx=t2.clientX, my=t2.clientY;
  NODES.forEach(n=>{
    const p=nodePos(n);
    if(Math.hypot(mx-p.x,my-p.y)<scale*2.8) openNode(n);
  });
},{passive:false});

function openNode(n){
  const viewer=document.getElementById('viewer');
  document.getElementById('vb-num').textContent='Pièce '+n.id;
  document.getElementById('vb-title').textContent=n.title.replace('\n',' ');
  document.getElementById('vb-role').textContent=n.role;
  document.getElementById('viewer-frame').src='data:text/html;base64,'+n.b64;
  viewer.classList.add('open');
  document.getElementById('hint').style.opacity='0';
}

document.getElementById('viewer-back').addEventListener('click',()=>{
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('viewer-frame').src='about:blank';
  setTimeout(()=>{ document.getElementById('hint').style.opacity='0.6'; },400);
});

// fade hint
setTimeout(()=>{ document.getElementById('hint').style.opacity='0'; }, 6000);
</script>
</body>
