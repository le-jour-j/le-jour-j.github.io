name: Keep Tour de Phrance Supabase Awake

on:
  schedule:
    - cron: '42 8 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Tour de Phrance Supabase
        run: |
          curl -L -sS \
            -H "apikey: ${{ secrets.TOUR_DE_PHRANCE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.TOUR_DE_PHRANCE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.TOUR_DE_PHRANCE_SUPABASE_URL }}/rest/v1/comments?select=id&limit=1"